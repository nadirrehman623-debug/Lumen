{% extends "layout.html" %}

{% block title %}
    Chat
{% endblock %}

{% block main %}
    <h1 class="text-center">Chat Interface</h1>
    <p class="response">{{ response }}</p>
    <form method="post" action="/chat/{{ session_id }}" id="chat-form">
        <div class="mb-3">
            <label for="user-input" class="form-label">Your Message:</label>
            <input type="text" class="form-control" id="user-input" name="user_input" required>
        </div>
        <button type="submit" class="btn btn-primary">Send</button>
    </form>
    <div id="chat-history" class="mt-4">
        <!-- Chat history will be displayed here -->
        
    </div>
    <script>
        const chatForm = document.getElementById('chat-form');
        const chatHistory = document.getElementById('chat-history');
    </script>
{% endblock %}
