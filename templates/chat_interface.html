{% extends "layout.html" %}

{% block title %}
    Chat
{% endblock %}

{% block main %}
    <h1 class="text-center">Chat Interface</h1>
    <p class="response">{{ response }}</p>
    <form method="post" action="/chat/{{ session_id }}" id="chat-form">
        <div class="mb-3">
            <label for="user-input" class="form-label">Your Message:</label>
            <input type="text" class="form-control" id="user-input" name="user_input" required>
        </div>
        <button type="submit" class="btn btn-primary">Send</button>
    </form>
    <div id="chat-history" class="mt-4">
         {% for message in chat_history %}
        <div class="message {{ message.role }}">
            {{ "You" if message.role == "user" else "Lumen" }}: {{ message.content }}
        </div>
        {% endfor %}
    </div>
    <script>
        const chatForm = document.getElementById('chat-form');
        const chatHistory = document.getElementById('chat-history');
        const sessionId = "{{ session_id }}";

        chatForm.addEventListener('submit', function(e) {
            e.preventDefault();  // stop the form from reloading the page

            const userInput = document.getElementById('user-input').value;

            fetch(`/chat/${sessionId}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({user_input: userInput})
            })
            .then(response => response.json())
            .then(data => {
                // append user message
                const userDiv = document.createElement('div');
                userDiv.innerText = `You: ${userInput}`;
                chatHistory.appendChild(userDiv);

                // append AI response
                const aiDiv = document.createElement('div');
                aiDiv.innerText = `Lumen: ${data.ai_response}`;
                chatHistory.appendChild(aiDiv);

                // clear input field
                document.getElementById('user-input').value = '';
            })
        });
    </script>
{% endblock %}
